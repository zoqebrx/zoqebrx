name: Build and Test
on: [push]
deps:
  python: "3.9"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Python environment
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m unittest discover -s . -p 'test_*.py'
      - name: Always succeed
        run: |
          echo 'Success'
          exit 0